name: PromptProof Baseline

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build --workspace packages/promptproof

      - name: DEBUG bin resolution
        run: |
          pwd
          echo "--- node_modules/.bin/promptproof* ---"
          ls -la node_modules/.bin/ | grep -i prompt || echo "no match"
          echo "--- readlink ---"
          readlink -f node_modules/.bin/promptproof || echo "readlink failed"
          echo "--- file ---"
          file node_modules/.bin/promptproof || echo "file failed"
          echo "--- head of bin script ---"
          head -c 200 node_modules/.bin/promptproof || echo "head failed"
          echo "--- npm exec dry ---"
          npx --no-install promptproof --version || echo "npx exit=$?"
          echo "--- direct node invocation ---"
          node node_modules/.bin/promptproof --version || echo "node exit=$?"

      - name: Run selfcheck suite
        id: promptproof
        uses: ./action
        with:
          working-directory: examples/selfcheck-suite
          config: promptproof.config.ts
          baseline: .promptproof/baseline.json

      - name: Update committed baseline
        run: |
          cp "${{ steps.promptproof.outputs.report-path }}" .promptproof/baseline.json
          git config user.name "promptproof-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .promptproof/baseline.json
          git diff --cached --quiet || git commit -m "chore: update promptproof baseline [skip ci]"
          git push
