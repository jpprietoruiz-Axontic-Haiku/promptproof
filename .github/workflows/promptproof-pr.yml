name: PromptProof PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: promptproof-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build --workspace packages/promptproof

      - name: Run selfcheck suite vs baseline
        uses: ./action
        with:
          working-directory: examples/selfcheck-suite
          config: promptproof.config.ts
          baseline: ../../.promptproof/baseline.json
